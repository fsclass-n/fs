    <div class="container my-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="card-custom p-4 mb-4">
                <h2 class="fw-bold mb-4">인사이드 아웃 2 <small class="text-secondary h6">CGV 강남</small></h2>
                <h5 class="mb-3"><i class="fa-solid fa-clock me-2"></i>상영 시간 선택</h5>
                <div class="d-flex gap-2 flex-wrap mb-4">
                    <button class="btn btn-outline-light active">14:30 (8석)</button>
                    <button class="btn btn-outline-light">16:50 (0석)</button>
                    <button class="btn btn-outline-light">19:10 (2석)</button>
                </div>
                <div class="bg-dark p-5 rounded-3 text-center mb-4">
                    <div class="text-secondary mb-3">SCREEN</div>
                    <div class="d-flex justify-content-center gap-1 mb-1" th:each="row : ${#numbers.sequence(1, 5)}">
                        <span class="bg-secondary d-inline-block rounded-1" style="width:20px; height:20px;"></span>
                        <span class="bg-danger d-inline-block rounded-1" style="width:20px; height:20px;"></span>
                    </div>
                    <p class="mt-3 small text-secondary">붉은색 구역이 RPA가 감시하는 '명당'입니다.</p>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card-custom p-4 sticky-top" style="top: 100px;">
                <h4 class="fw-bold mb-3">RPA 알림 신청</h4>
                <p class="small text-secondary">취소표가 생기거나 명당 자리가 비면 즉시 알려드립니다.</p>
                <hr class="border-secondary">
                <div class="mb-3">
                    <label class="form-label small">알림 조건</label>
                    <select class="form-select bg-dark text-white border-secondary">
                        <option>명당 구역 1석 이상 발생 시</option>
                        <option>중앙 블록 전체</option>
                    </select>
                </div>
                <button class="btn btn-primary-custom w-100 py-3">RPA 감시 시작</button>
            </div>
        </div>
    </div>
</div>
