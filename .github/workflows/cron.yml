name: 12분 주기 데이터 자동 적재

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: 

# 전역 환경 변수 설정: Node 20 경고를 무시하고 Node 24를 강제 사용함
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 크롤링 실행
        # 파일 경로가 프로젝트 루트 기준이므로 demo/ 를 붙여야 합니다.
        run: python demo/crawler/crawler.py

      - name: 변경된 JSON 파일 저장 (Git Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add demo/data/movies.json
          git commit -m "Update movies.json [skip ci]" || echo "No changes"
          git push

      - name: 서버에 적재 명령 호출 (Trigger)
        run: curl -X GET "https://megabox-kr.onrender.com/load"
