name: 12분 주기 데이터 자동 적재

on:
  schedule:
    - cron: '*/12 * * * *' # 12분마다 실행
  workflow_dispatch: # 수동 실행 가능

# 전역 환경 변수: Node 20 기반 액션들을 Node 24 환경에서 강제로 실행하도록 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 리포지토리 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정 (3.11 버전)
      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 필요한 라이브러리 설치
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 크롤러 스크립트 실행
      - name: 크롤링 실행
        run: python demo/crawler/crawler.py

      # 5. 데이터 변경 사항 확인 및 Git Push
      - name: 변경된 JSON 파일 저장 (Git Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 변경 사항이 있는지 확인 후 commit/push 진행
          git add demo/data/movies.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update movies.json [skip ci]"
            git push
          fi

      # 6. 외부 서버 API 호출 (데이터 로드 트리거)
      - name: 서버에 적재 명령 호출 (Trigger)
        run: curl -X GET "https://megabox-kr.onrender.com/load"
