name: 12분 주기 데이터 자동 적재

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: 

env:
  # Node 20 지원 종료에 따른 강제 실행 설정 (경고 무시 및 빌드 성공 보장)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # demo 폴더 안의 requirements.txt를 명시적으로 설치
          if [ -f demo/requirements.txt ]; then 
            pip install -r demo/requirements.txt
          else 
            echo "requirements.txt를 찾을 수 없습니다. 기본 requests만 설치합니다."
            pip install requests
          fi

      - name: 크롤링 실행
        # 경로가 demo/crawler/crawler.py 인지 꼭 확인하세요.
        run: python demo/crawler/crawler.py

      - name: 변경된 JSON 파일 저장 (Git Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 파일 경로가 일치해야 git add가 성공합니다.
          git add demo/data/movies.json || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "변경 사항이 없습니다."
          else
            git commit -m "Update movies.json [skip ci]"
            git push
          fi

      - name: 서버에 적재 명령 호출 (Trigger)
        run: curl -X GET "https://megabox-kr.onrender.com/load"
